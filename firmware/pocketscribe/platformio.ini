; PlatformIO build config for PocketScribe firmware.
; Build/upload:  pio run -t upload   (or use the browser flasher — see docs/FLASHING.md)
;
; Board: Waveshare ESP32-S3-ePaper-1.54 uses ESP32-S3-PICO-1-N8R8 (8MB flash, 8MB PSRAM).
; The esp32-s3-devkitc-1 environment matches the S3 well; we set 8MB flash + OPI PSRAM.
[platformio]
; Sources (.ino + .h) live flat in this directory, not in a src/ subfolder.
src_dir = .

[env:pocketscribe]
; The official platformio/platform-espressif32 (even 7.x) still ships Arduino core
; 2.0.17 (ESP-IDF 4.4), which lacks the ESP-IDF v5 I2S std driver (driver/i2s_std.h)
; this firmware uses. Pin the pioarduino fork, which ships Arduino core 3.x / IDF v5.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

board_build.flash_size = 8MB
board_build.psram_type = opi
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1     ; native-USB serial (also enables browser flashing)

lib_deps =
  tzapu/WiFiManager @ ^2.0.17
  zinggjm/GxEPD2 @ ^1.6.0
  bblanchon/ArduinoJson @ ^7.1.0
